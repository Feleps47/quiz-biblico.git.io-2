<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Bíblico - Mulheres da Bíblia</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top,#dff6ff,#fef9d7);
}
.container{
    max-width:700px;
    margin:30px auto;
    padding:25px;
    background:white;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
h1{text-align:center;color:#4a6fa5;}
.pergunta{
    background:#f0f8ff;
    padding:15px;
    margin:15px 0;
    border-radius:15px;
    transition:0.3s;
}
.pergunta.correta{background:#d4ffd4;}
.pergunta.errada{background:#ffd6d6;}
label{display:block;margin:6px 0;cursor:pointer;}
button{
    width:100%;
    padding:12px;
    background:#4a90e2;
    border:none;
    border-radius:15px;
    font-size:16px;
    color:white;
    cursor:pointer;
}
button:hover{background:#357ABD;}
#resultado{text-align:center;margin-top:20px;font-size:20px;}
.faseTitulo{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
    color:#ff8c42;
}
.confete{
    position:fixed;
    width:8px;
    height:8px;
    top:0;
    animation:cair 2s linear forwards;
}
@keyframes cair{
    to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
#telaInicial, #grupoForm {text-align:center;margin-top:20px;}
input[type="text"]{padding:6px;margin:5px;border-radius:8px;border:1px solid #ccc;}
.estrela{font-size:30px;cursor:pointer;margin:2px;}
</style>
</head>
<body>

<div class="container">

<h1>🌟 Jogo Bíblico por Fases 🌟</h1>

<div id="telaInicial">
    <p>Escolha o modo de jogo:</p>
    <button onclick="modoSolo()">🎮 Solo</button>
    <button onclick="modoGrupo()">👥 Em Grupo</button>
</div>

<div id="grupoForm" style="display:none;">
    <h3>Criar Grupo</h3>
    <input type="text" id="nomeGrupo" placeholder="Nome do grupo"><br>
    <input type="text" id="nomeJogador" placeholder="Nome da criança">
    <button onclick="adicionarJogador()">Adicionar jogador</button>
    <ul id="listaJogadores"></ul>
    <button id="iniciarJogoGrupo" onclick="iniciarJogoGrupo()" disabled>Iniciar Jogo</button>
</div>

<div class="faseTitulo" id="faseTitulo"></div>
<div id="vezDe"></div>
<div id="quiz"></div>
<button id="btnResponder" onclick="corrigir()" style="display:none;">Responder Pergunta</button>
<div id="resultado"></div>

<div id="avaliacao" style="text-align:center;margin-top:20px; display:none;">
  <h3>Avalie o jogo ⭐</h3>
  <span class="estrela" data-val="1">☆</span>
  <span class="estrela" data-val="2">☆</span>
  <span class="estrela" data-val="3">☆</span>
  <span class="estrela" data-val="4">☆</span>
  <span class="estrela" data-val="5">☆</span>
  <p id="nota"></p>
</div>

<div id="creditos" style="text-align:center;margin-top:20px; display:none;">
  Desenvolvido por: Tio Felipe 😄
</div>

<audio id="somAcerto" src="https://www.soundjay.com/human/applause-8.mp3"></audio>
<audio id="somErro" src="https://www.soundjay.com/misc/sad-trombone-01.mp3"></audio>

<script>
const perguntas = [
{p:"1) Sara aprendeu que:",a:"Desistir",b:"O tempo de Deus é perfeito",c:"Duvidar",d:"Reclamar",r:"b"},
{p:"2) Isaque prova que Deus:",a:"Esquece",b:"É fiel",c:"Falha",d:"Demora",r:"b"},
{p:"3) Ana buscou:",a:"Magia",b:"Oração sincera",c:"Amuletos",d:"Feitiço",r:"b"},
{p:"4) Deus deu a Ana:",a:"Samuel",b:"Davi",c:"José",d:"Isaque",r:"a"},
{p:"5) Temos livre acesso a Deus por:",a:"Dinheiro",b:"Oração",c:"Rituais",d:"Templo",r:"b"},
{p:"6) Maria se chamou:",a:"Rainha",b:"Serva do Senhor",c:"Princesa",d:"Sacerdotisa",r:"b"},
{p:"7) Maior alegria do cristão:",a:"Fama",b:"Dizer sim a Deus",c:"Riqueza",d:"Poder",r:"b"},
{p:"8) Ester estava no palácio:",a:"Por acaso",b:"Para um tempo como este",c:"Por sorte",d:"Sem motivo",r:"b"},
{p:"9) Ester antes de agir:",a:"Fugiu",b:"Jejuou e orou",c:"Ignorou",d:"Brigou",r:"b"},
{p:"10) Deus está:",a:"Ausente",b:"No controle da história",c:"Dormindo",d:"Distante",r:"b"},
{p:"11) Débora liderava ouvindo:",a:"O povo",b:"A voz de Deus",c:"Reis",d:"Exército",r:"b"},
{p:"12) Liderança verdadeira nasce da:",a:"Força",b:"Dependência de Deus",c:"Riqueza",d:"Política",r:"b"},
{p:"13) Dorcas demonstrava fé:",a:"Falando",b:"Ajudando necessitados",c:"Criticando",d:"Isolando-se",r:"b"},
{p:"14) Dorcas fazia boas obras porque:",a:"Queria fama",b:"Já era salva",c:"Obrigação",d:"Medo",r:"b"},
{p:"15) Fé verdadeira produz:",a:"Orgulho",b:"Amor e serviço",c:"Competição",d:"Vaidade",r:"b"},
{p:"16) Abigail foi:",a:"Impulsiva",b:"Prudente e pacificadora",c:"Orgulhosa",d:"Indiferente",r:"b"},
{p:"17) Ela evitou o mal com:",a:"Espada",b:"Palavras sábias",c:"Gritos",d:"Fuga",r:"b"},
{p:"18) Devemos buscar:",a:"Conflito",b:"Paz",c:"Vingança",d:"Orgulho",r:"b"},
{p:"19) Sara creu mesmo sendo:",a:"Jovem",b:"Idosa",c:"Rainha",d:"Rica",r:"b"},
{p:"20) Todas ensinam a:",a:"Desistir",b:"Confiar, orar e obedecer",c:"Competir",d:"Buscar fama",r:"b"},
];

let fase = 1;
let inicio = 0;
let modo = "solo";
let jogadores = [];
let grupoNome = "";
let vezAtual = 0;
let pontuacoes = {};

function modoSolo(){
    modo="solo";
    document.getElementById("telaInicial").style.display="none";
    document.getElementById("btnResponder").style.display="block";
    carregarFase();
}

function modoGrupo(){
    if(localStorage.getItem("grupoCriado")){
        if(confirm("Já existe um grupo criado neste aparelho. Deseja criar um novo grupo?")){
            localStorage.removeItem("grupoCriado");
            jogadores = [];
            pontuacoes = {};
            vezAtual = 0;
            inicio = 0;
            fase = 1;
        } else {
            return;
        }
    }
    modo="grupo";
    document.getElementById("telaInicial").style.display="none";
    document.getElementById("grupoForm").style.display="block";
}

function adicionarJogador(){
    const nome = document.getElementById("nomeJogador").value.trim();
    if(nome!==""){
        jogadores.push(nome);
        const li=document.createElement("li");
        li.textContent=nome;
        document.getElementById("listaJogadores").appendChild(li);
        document.getElementById("nomeJogador").value="";
        document.getElementById("iniciarJogoGrupo").disabled=false;
    }
}

function iniciarJogoGrupo(){
    grupoNome=document.getElementById("nomeGrupo").value.trim() || "Grupo";
    jogadores.forEach(j=>pontuacoes[j]=0);
    localStorage.setItem("grupoCriado", "true");
    document.getElementById("grupoForm").style.display="none";
    document.getElementById("btnResponder").style.display="block";
    mostrarVez();
    carregarFase();
}

function mostrarVez(){
    document.getElementById("vezDe").innerText = "Quem está respondendo: " + jogadores[vezAtual];
}

function carregarFase(){
    document.getElementById("quiz").innerHTML="";
    document.getElementById("resultado").innerHTML="";
    document.getElementById("faseTitulo").innerText="Fase "+fase+" ⭐";

    for(let i=inicio;i<inicio+5;i++){
        let q=perguntas[i];
        document.getElementById("quiz").innerHTML+=`
        <div class="pergunta">
        <h3>${q.p}</h3>
        <label><input type="radio" name="q${i}" value="a"> A) ${q.a}</label>
        <label><input type="radio" name="q${i}" value="b"> B) ${q.b}</label>
        <label><input type="radio" name="q${i}" value="c"> C) ${q.c}</label>
        <label><input type="radio" name="q${i}" value="d"> D) ${q.d}</label>
        </div>`; 
    }
}

function soltarConfete(){
    for(let i=0;i<30;i++){
        let c=document.createElement("div");
        c.classList.add("confete");
        c.style.left=Math.random()*100+"vw";
        c.style.backgroundColor=["#4a90e2","#50c878","#ffcc00","#ff8c42"][Math.floor(Math.random()*4)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
    }
}

// Avaliação 5 estrelas
document.querySelectorAll(".estrela").forEach(star=>{
    star.addEventListener("click", ()=>{
      const val = star.getAttribute("data-val");
      document.querySelectorAll(".estrela").forEach(s=>{
        s.textContent = s.getAttribute("data-val")<=val?"⭐":"☆";
      });
      document.getElementById("nota").innerText = "Você avaliou: "+val+" de 5";
    });
});

function finalizarJogoGrupo(){
    const placar = jogadores.map(j=>"🏅 "+pontuacoes[j]+" pts").join(" | ");
    let max = Math.max(...Object.values(pontuacoes));
    let vencedores = jogadores.filter(j=>pontuacoes[j]===max).join(", ");
    document.getElementById("resultado").innerHTML = 
      "🏆 Jogo finalizado! Placar final: "+placar+"<br>"+
      "🎖️ Vencedor(es): "+vencedores;
    
    document.getElementById("avaliacao").style.display="block";
    document.getElementById("creditos").style.display="block";
}

function corrigir(){
    let pontos=0;
    for(let i=inicio;i<inicio+5;i++){
        let selecionada=document.querySelector('input[name="q'+i+'"]:checked');
        if(selecionada && selecionada.value===perguntas[i].r){
            pontos+=10;
            document.getElementById("somAcerto").play();
            soltarConfete();
        }else{
            document.getElementById("somErro").play();
        }
    }

    if(modo==="solo"){
        if(pontos>=30){
            fase++;
            inicio+=5;
            if(fase<=4){
                document.getElementById("resultado").innerHTML="🎉 Você passou para a próxima fase!";
                setTimeout(carregarFase,2000);
            }else{
                document.getElementById("resultado").innerHTML="🏆 PARABÉNS! Você concluiu o jogo!";
                document.getElementById("avaliacao").style.display="block";
                document.getElementById("creditos").style.display="block";
            }
        }else{
            document.getElementById("resultado").innerHTML="😢 Você precisa acertar pelo menos 3 para avançar. Tente novamente!";
        }
    }else{
        const jogadorAtual = jogadores[vezAtual];
        pontuacoes[jogadorAtual] += pontos;
        let placar = jogadores.map(j=>"🏅 "+j+": "+pontuacoes[j]+" pts").join(" | ");
        document.getElementById("resultado").innerHTML = `🎉 ${jogadorAtual} fez ${pontos} pontos!<br>`+placar;

        vezAtual = (vezAtual+1) % jogadores.length;
        mostrarVez();
        fase++;
        inicio+=5;
        if(fase<=4){
            setTimeout(carregarFase,2000);
        }else{
            finalizarJogoGrupo();
        }
    }
}
</script>

</body>
</html>
